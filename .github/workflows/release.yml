name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          proj=$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' src/live/__init__.py)
          if [ "$tag" != "$proj" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $proj" >&2
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke test wheel
        run: |
          uv tool install --from dist/*.whl live-cmd
          live --version
          test "$(live --version)" = "live ${GITHUB_REF_NAME#v}"

      - name: Run tests
        run: uv run pytest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
